<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout | QuickBite</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .checkout-container {
            max-width: 1000px;
            margin: auto;
        }

        .card {
            border-radius: 12px;
            padding: 20px;
        }

        .place-order-btn {
            background-color: #ff5a00;
            color: white;
            border-radius: 10px;
            width: 100%;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar bg-white px-4">
    <h4>🍔 QuickBite</h4>

    <div>
        <a class="me-3 text-decoration-none" th:href="@{/}">Home</a>
        <a class="me-3 text-decoration-none" th:href="@{/cart}">Cart</a>
    </div>
</nav>

<div class="checkout-container mt-5 row">

    <!-- LEFT: ADDRESS & PAYMENT -->
    <div class="col-md-6">

        <div class="card mb-4">
            <h4>Delivery Address</h4>
<form th:action="@{/quickbite/checkout/order-placed}" method="post">

    <!-- SAVED ADDRESS -->
    <div th:if="${addresses != null and !#lists.isEmpty(addresses)}">

        <h5 class="mb-2">📍 Select Saved Address</h5>

        <select class="form-control custom-input mb-3" name="addressId">
            <option value="">-- Select Address --</option>

            <option th:each="address : ${addresses}"
                    th:value="${address.id}"
                    th:text="${address.fullName + ' - ' + address.fullAddress + ' - ' + address.phoneNo}">
            </option>
        </select>

        <div class="text-center text-muted mb-3">OR</div>

    </div>

    <!-- NEW ADDRESS -->
    <div>
        <h5 class="mb-2">➕ Add New Address</h5>

        <input class="form-control custom-input mb-3"
               name="FullName" placeholder="Full Name">

        <input class="form-control custom-input mb-3"
               name="PhoneNo" placeholder="Phone Number">

        <textarea class="form-control custom-input mb-3"
                  name="FullAddress"
                  placeholder="Full Address"></textarea>
    </div>

    <!-- PAYMENT -->
    <h5>💳 Payment Method</h5>

    <select class="form-control custom-input mb-3" name="paymentMethod">
        <option>Cash on Delivery</option>
        <option>UPI</option>
        <option>Card</option>
    </select>

    <!-- BUTTON -->
    <button type="submit" class="btn place-order-btn w-100">
        Place Order
    </button>

</form>
        </div>

    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="col-md-6">

        <div class="card">
            <h4>Order Summary</h4>

            <div th:each="item : ${cartItems}" class="d-flex justify-content-between mb-2">
                <span>
                    <span th:text="${item.menu.itemName}"></span>
                    x <span th:text="${item.quantity}"></span><br>
                    
                    
                    
                </span>
                
                <span>
                    $<span th:text="${item.quantity * item.menu.itemPrice}"></span><br>
                    
                    
                </span>
            </div>

            <hr>

            <div class="d-flex justify-content-between">
                <strong>Tax</strong>
                <strong>$<span th:text="${#numbers.formatDecimal(0.025 *total , 1, 2)}"></span></strong>
                <br>
                <strong>Total</strong>
                <strong>$<span th:text="${#numbers.formatDecimal(total + 0.025 *total , 1, 2)}"></span></strong>
            </div>

        </div>

    </div>

</div>

</body>
</html>
