<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart | FoodHub</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .cart-container {
            max-width: 900px;
            margin: auto;
        }

        .cart-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .remove-btn {
            color: red;
            text-decoration: none;
            
        }

        .checkout-btn {
            background-color: #ff5a00;
            color: white;
            border-radius: 10px;
        }
        .cart-operation{
            display: flex;
            flex-direction: row;  /* horizontal */
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar bg-white px-4">
    <h4>🍔 FoodHub</h4>

    <div>
        <a class="me-3 text-decoration-none" th:href="@{/}">Home</a>
        <a class="me-3 text-decoration-none" th:href="@{/restaurants}">Restaurants</a>
    </div>
</nav>

<!-- CART -->
<div class="cart-container mt-5">

    <h2>Your Cart</h2>

    <!-- EMPTY CART -->
    <div th:if="${#lists.isEmpty(cartItems)}">
        <p>Your cart is empty 😢</p>
        <a class="btn btn-warning" th:href="@{/restaurants}">Browse Food</a>
    </div>

    <!-- CART ITEMS -->
    <div th:each="item : ${cartItems}" class="cart-item d-flex align-items-center justify-content-between">

        <div class="d-flex align-items-center gap-3">
            <img th:src="${item.menu.itemImageUrl}" class="item-img"/>

            <div>
                <h5 th:text="${item.menu.itemName}">Item</h5>
                <span th:text="${item.menu.restaurant.restaurantName}"></span>
            </div>
        </div>

        <div class="cart-operation">
            <form method="post" th:action="@{'/quickbite/cart/decrement/' + ${item.menu.itemID}}">
            <button class="remove-btn">
                -
        </button>
            </form>
            <button class="remove-btn"
                th:text="${item.quantity}">
                -
        </button>

        <form method="post" th:action="@{'/quickbite/cart/increment/' + ${item.menu.itemID}}">
            <button class="remove-btn">
                +
        </button>
        </form>
                <p class="mb-1">$<span th:text="${#numbers.formatDecimal(item.quantity * item.menu.itemPrice, 1, 2)}"></span></p>
        </div>

    </div>

    <!-- TOTAL -->
    <div th:if="${!#lists.isEmpty(cartItems)}" class="mt-4 text-end">
        <h4>Total: $<span th:text="${cartTotal}"></span></h4>
        <h4>Tax: $<span th:text="${#numbers.formatDecimal(0.025*cartTotal,1,2)}"></span></h4>
        <h4>Grand Total: $<span th:text="${#numbers.formatDecimal(0.025*cartTotal + cartTotal,1,2)}"></span></h4>
        <button class="btn checkout-btn mt-2">
            Checkout
        </button>
    </div>

</div>

</body>
</html>
