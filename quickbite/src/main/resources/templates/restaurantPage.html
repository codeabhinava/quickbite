<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menu</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
        }

        /* Navbar */
        .navbar {
            background-color: white;
            padding: 15px;
        }

        /* Hero */
        .hero {
            position: relative;
            height: 300px;
            background-size: cover;
            background-position: center;
            color: white;
        }

        .hero-overlay {
            background: rgba(0,0,0,0.5);
            height: 100%;
            padding: 40px;
        }

        /* Cards */
        .card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card img {
            height: 200px;
            object-fit: cover;
        }

        .add-btn {
            background-color: #ff5a00;
            color: white;
            border-radius: 10px;
        }
        a{
            text-decoration: none;
            font-size: 20px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: black;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar d-flex justify-content-between">
    <a th:href="@{/quickbite/home}">🍔 QuickBite</a>

    <div>
        <a class="me-3 text-decoration-none" th:href="@{/quickbite/home}">Home</a>
        <a class="me-3 text-decoration-none" th:href="@{/quickbite/viewRestaurants}">Restaurants</a>
        <a class="btn btn-warning text-white" th:href="@{/quickbite/cart}">Cart</a>
    </div>
</nav>

<!-- HERO SECTION -->
<div class="hero"
     th:style="'background-image:url(' + ${restaurant.restaurantCoverImage} + ')'">

    <div class="hero-overlay">

        <a th:href="@{/quickbite/viewRestaurants}" class="text-white text-decoration-none">
            ← Back to Restaurants
        </a>

        <h1 class="mt-3" th:text="${restaurant.restaurantName}">Restaurant Name</h1>

        <p >
            Restaurant description
        </p>

        <p>
            ⭐ <span >4.5</span> |
            ⏱ <span >30</span> mins
        </p>

    </div>
</div>

<!-- MENU SECTION -->
<div class="container mt-5">

    <h2>Menu</h2>

    <div class="row mt-4">

        <div class="col-md-4 mb-4"
             th:each="item : ${menuItems}">

            <div class="card">

                <img th:src="${item.itemImageUrl}"/>

                <div class="p-3">

                    <h5 th:text="${item.itemName}">Item Name</h5>

                    <small class="text-muted"
                           th:text="${item.itemCategory}">Category</small>

                    <p class="mt-2"
                       th:text="${item.itemDescription}">
                        Description
                    </p>

                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold"
                              th:text="'$' + ${item.itemPrice}">
                            $10
                        </span>
                    <form th:unless="${cartQuantity != null and cartQuantity.containsKey(item.itemID)}"
                        method="post" th:action="@{/quickbite/addeditem}">
                        <input type="hidden" name="item_id" th:value="${item.itemID}" />
                        <input type="hidden" name="restaurantName" th:value="${restaurant.restaurantName}" />
                        <button class="btn add-btn">🛒 Add</button>
                    </form>

                        <div th:if="${cartQuantity != null and cartQuantity.containsKey(item.itemID)}"
                            class="d-flex align-items-center gap-2">

                            <form method="post" th:action="@{/quickbite/remove}">
                                <input type="hidden" name="item_id" th:value="${item.itemID}" />
                                <input type="hidden" name="restaurantName" th:value="${restaurant.restaurantName}"/>
                                <button name="action" value="decrease" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                            


                            <form method="post" th:action="@{/quickbite/decrement}">
                                <input type="hidden" name="item_id" th:value="${item.itemID}" />
                                <input type="hidden" name="restaurantName" th:value="${restaurant.restaurantName}"/>
                                <button name="action" value="decrease" class="btn btn-sm btn-outline-danger">−</button>
                            </form>
                            
                                <span th:text="${cartQuantity.get(item.itemID)}">1</span>

                            <form method="post" th:action="@{/quickbite/increment}">
                                <input type="hidden" name="item_id" th:value="${item.itemID}" />
                                <input type="hidden" name="restaurantName" th:value="${restaurant.restaurantName}"/>
                                <button name="action" value="increase" class="btn btn-sm add-btn">+</button>
                            </form>
                        </div>
                    </div>
                    
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
